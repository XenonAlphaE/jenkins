services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: jenkins-sandbox1
    ports:
      - "12000:8080"
      - "12001:50000"
    networks:
      - jenkins_net
    volumes:
      - jenkins_home:/var/jenkins_home
    environment:
      - DOCKER_HOST=tcp://dind:2375
      - DOCKER_BUILDKIT=1
    depends_on:
      - dind
    restart: unless-stopped

  dind:
    image: docker:24-dind
    container_name: dind
    privileged: true
    networks:
      - jenkins_net
    # MTU 1400 fixes the 'EOF' error during image pulls in many DinD setups
    command: 
      - dockerd
      - --host=tcp://0.0.0.0:2375
      - --host=unix:///var/run/docker.sock
      - --tls=false
      - --mtu=1400
    environment:
      - DOCKER_TLS_CERTDIR=
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - dind_storage:/var/lib/docker
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
networks:
  jenkins_net:
    driver: bridge

volumes:
  jenkins_home:
    external: true
  dind_storage: